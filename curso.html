<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Curso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img src="img/LOGO FEMAF 02.png" alt="Logo FEMAF" class="logo-femaf">
            </a>
            <h1><a href="index.html">Cursos de Extensão - EAD FEMAF</a></h1>
        </div>
    </header>
    <main>
        <div id="curso-detalhes" class="curso-detalhes"></div>
    </main>
    <div id="modalCheckout" class="modal-checkout" aria-hidden="true">
        <div class="modal-checkout-backdrop"></div>
        <div class="modal-checkout-content">
            <h3>Você já possui cadastro EAD na FEMAF?</h3>
            <div class="modal-checkout-choices">
                <button type="button" class="modal-checkout-btn" data-choice="existing">Já sou aluno EAD FEMAF</button>
                <button type="button" class="modal-checkout-btn" data-choice="new">Ainda não sou aluno EAD FEMAF</button>
            </div>
            <div id="formExisting" class="modal-checkout-form" style="display: none;">
                <label for="inputMatricula">Matrícula EAD</label>
                <input type="text" id="inputMatricula" placeholder="Ex: 202312345" autocomplete="off">
                <button type="button" id="btnContinuarExisting" class="btn-matricula">Continuar para pagamento</button>
            </div>
            <div id="formNew" class="modal-checkout-form" style="display: none;">
                <label for="inputNome">Nome</label>
                <input type="text" id="inputNome" placeholder="Nome" autocomplete="given-name">
                <label for="inputSobrenome">Sobrenome</label>
                <input type="text" id="inputSobrenome" placeholder="Sobrenome" autocomplete="family-name">
                <label for="inputEmail">Email</label>
                <input type="email" id="inputEmail" placeholder="email@exemplo.com" autocomplete="email">
                <label for="inputCpf">CPF</label>
                <input type="text" id="inputCpf" placeholder="Somente números" maxlength="14" autocomplete="off">
                <button type="button" id="btnContinuarNew" class="btn-matricula">Continuar para pagamento</button>
            </div>
            <p id="modalMensagemErro" class="modal-checkout-erro" style="display: none;"></p>
            <button type="button" class="modal-checkout-voltar" id="btnModalVoltar" style="display: none;">Voltar</button>
            <button type="button" class="modal-checkout-fechar" id="btnModalFechar" aria-label="Fechar">×</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Cursos de Extensão. Todos os direitos reservados.</p>
    </footer>
    <div class="chatbot-container">
        <button class="chatbot-toggle" id="chatbotToggle" aria-label="Abrir assistente de cursos">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="chatbot-panel" id="chatbotPanel">
            <div class="chatbot-header">
                <h3>Assistente de Cursos</h3>
                <button class="chatbot-close" id="chatbotClose" aria-label="Fechar assistente">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="chatbot-messages" id="chatbotMessages">
                <div class="chatbot-welcome">
                    <p>Olá! Como posso ajudá-lo com nossos cursos de extensão?</p>
                </div>
            </div>
            <div class="chatbot-input-container">
                <input type="text" class="chatbot-input" id="chatbotInput" placeholder="Digite sua mensagem...">
                <button class="chatbot-send" id="chatbotSend" aria-label="Enviar mensagem">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 2L9 11M18 2L12 18L9 11M18 2L2 8L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/curso.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
